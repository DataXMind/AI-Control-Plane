name: Publish GHCR demo image

on:
  workflow_dispatch:
  push:
    branches:
      - master
    paths:
      - src/ai_control_plane/core/governance_catalog.py
      - examples/minimal/Dockerfile
      - examples/minimal/docker-compose.yml
    tags:
      - "v0.1.*"
      - "docker-demo-*"

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  publish-demo:
    name: Build and push demo image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=demo
            type=semver,pattern={{version}}
            type=ref,event=tag

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: examples/minimal/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Verify catalog version in pushed image
        run: |
          IMAGE="${{ env.REGISTRY }}/dataxmind/ai-control-plane:demo"
          docker pull "${IMAGE}"
          EXPECTED=$(python3 -c "from ai_control_plane.core.governance_catalog import GOVERNANCE_VERSION; print(GOVERNANCE_VERSION)")
          ACTUAL=$(docker run --rm "${IMAGE}" python3 -c \
            "from ai_control_plane.core.governance_catalog import GOVERNANCE_VERSION; print(GOVERNANCE_VERSION)")
          echo "Expected catalog: ${EXPECTED}"
          echo "Image catalog:    ${ACTUAL}"
          test "${EXPECTED}" = "${ACTUAL}"
