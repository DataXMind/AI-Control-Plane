name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  governance-memory:
    name: L5 memory pack (ML5)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: chmod +x scripts/verify_governance_memory.sh
      - run: bash scripts/verify_governance_memory.sh

  smoke:
    name: Smoke gate
    needs: governance-memory
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -e ".[dev]" --quiet
      - run: pytest tests/test_smoke.py -v -m smoke --tb=short
        env:
          ACP_CONFIG_DIR: tests/fixtures/config
        timeout-minutes: 2

  test:
    name: Full suite
    needs: smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -e ".[dev]" --quiet
      - run: pytest tests/ -v --cov=ai_control_plane --cov-report=xml
        env:
          ACP_CONFIG_DIR: tests/fixtures/config
      - run: pytest tests/test_shipped_config_parity.py -v -m shipped_config
      - run: ruff check src/ tests/
      - run: mypy src/ai_control_plane/ --strict
      - name: Upload coverage to Codecov
        if: ${{ vars.CODECOV_ENABLED == 'true' }}
        uses: codecov/codecov-action@v4
        with:
          files: coverage.xml
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  examples-minimal-smoke:
    name: Examples minimal docker-compose smoke
    runs-on: ubuntu-latest
    needs: smoke
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: Build and start minimal stack
        run: |
          docker compose -f examples/minimal/docker-compose.yml up --build -d
          sleep 15
      - name: Health check
        run: |
          curl -sf http://localhost:8000/health | python3 -m json.tool
          curl -sf http://localhost:8000/health | \
            python3 -c "import sys,json; d=json.load(sys.stdin); assert d['status']=='ok'"
      - name: Governance runtime
        run: |
          export ACP_API_URL=http://127.0.0.1:8000
          bash scripts/verify_governance_status_runtime.sh
      - name: OpenAPI runtime
        run: |
          export ACP_API_URL=http://127.0.0.1:8000
          bash scripts/verify_openapi_runtime.sh
      - name: Policy evaluate smoke
        run: |
          curl -sf -X POST http://localhost:8000/policy/evaluate \
            -H "Content-Type: application/json" \
            -d '{"agent_id":"agent2","project_id":"rust-gateway","tool_name":"git_read","role":"backend"}' | \
            python3 -c "import sys,json; d=json.load(sys.stdin); assert d['allowed'] is True"
      - name: Teardown
        if: always()
        run: docker compose -f examples/minimal/docker-compose.yml down
