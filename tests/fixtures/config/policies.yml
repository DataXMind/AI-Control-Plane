# Test policies — production schema (rbac/abac/quotas) aligned with config/policies.yml (NEW-2).
# Augmentations for policy unit tests are marked below.
version: 1

rbac:
  roles:
    infra:
      allowed_actions:
        - git.read
        - git.commit
        - git.push
        - k8s.diff
        - k8s.apply
        - helm.upgrade
        - plan.generate
      denied_actions:
        - git.force_push
        - k8s.delete_namespace
        - prod.deploy_without_approval

    backend:
      allowed_actions:
        - git.read
        - git.commit
        - git.push
        - git.diff
        - test.run
        - build.rust
        - cargo.clippy
        - create_pr
      denied_actions:
        - git.force_push
        - k8s.apply
        - git.merge_to_main
        - prod.deploy

    reviewer:
      allowed_actions:
        - git.read
        - git.diff
        - comment.post
        - approval.grant
        - approval.deny
      denied_actions:
        - git.commit
        - git.push
        - k8s.apply
        - k8s.delete
        - quota.override

abac:
  rules:
    - id: Restrict-PII
      description: Deny read/write on PII-tagged paths outside reviewer role
      effect: deny
      actions:
        - git.read
        - git.commit
      conditions:
        data_class: pii

    - id: prod-k8s-approval
      description: Production k8s apply requires approval
      effect: allow
      actions:
        - k8s.apply
      conditions:
        environment: prod
        requires_approval: true

    - id: Deny-prod-k8s-unapproved
      description: Block direct K8s mutations in production unless approved
      effect: deny
      actions:
        - k8s.apply
      conditions:
        environment: prod
        approval_status: not_approved

quotas:
  by_project:
    rust-gateway:
      tokens_per_day: 2000000
      concurrent_tasks: 5

guardrails:
  - name: "Require-plan-before-code"
    description: "Agents must submit plan before high-impact code changes"
    applies_to:
      task_types: ["code-edit", "infra-refactor"]
    effect: "enforce_plan_phase"
  - name: "No-direct-merge-to-main"
    description: "Agents cannot push directly to main"
    applies_to:
      branches: ["main"]
    effect: "deny_direct_push_and_merge"

kill_switch:
  active: false
  reason: ""
