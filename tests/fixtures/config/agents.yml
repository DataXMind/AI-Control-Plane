version: 1

model_profiles:
  claude-team-infra:
    provider: anthropic
    account_type: team
    api_key_env: ANTHROPIC_API_KEY_INFRA
    max_tokens_per_day: 500000
    allowed_tasks:
      - git.read
      - k8s.apply

  claude-pro-backend:
    provider: anthropic
    account_type: pro
    api_key_env: ANTHROPIC_API_KEY_BACKEND
    max_tokens_per_day: 150000
    allowed_tasks:
      - git.read
      - test.run

  claude-team-review:
    provider: anthropic
    account_type: team
    api_key_env: ANTHROPIC_API_KEY_REVIEW
    max_tokens_per_day: 300000
    allowed_tasks:
      - git.read
      - code.review

agents:
  agent1:
    name: infra-antigravity
    roles: [infra]
    projects: [rust-gateway]
    runner: antigravity
    model_profile: claude-team-infra
    capabilities: [k8s, git]
    restrictions: []

  agent2:
    name: backend-vscode
    roles: [backend]
    projects: [rust-gateway]
    runner: vscode
    model_profile: claude-pro-backend
    capabilities: [git]
    restrictions: []

  agent3:
    name: reviewer-cli
    roles: [reviewer]
    projects: [rust-gateway]
    runner: cli
    model_profile: claude-team-review
    capabilities: [git_read]
    restrictions: [read_only]
