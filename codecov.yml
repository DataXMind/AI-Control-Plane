# Codecov configuration (GAP-CC-1) — aligns with pyproject.toml fail_under=70
coverage:
  status:
    project:
      default:
        target: 70%
        threshold: 2%
    patch:
      default:
        informational: true

comment:
  layout: "reach,diff,flags,tree"
  behavior: default
  require_changes: false
