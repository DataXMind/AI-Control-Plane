# Codecov configuration — aligns with pyproject.toml fail_under=85 (pre–PB-12)
coverage:
  status:
    project:
      default:
        target: 85%
        threshold: 2%
    patch:
      default:
        informational: true

comment:
  layout: "reach,diff,flags,tree"
  behavior: default
  require_changes: false
